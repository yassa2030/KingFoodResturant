<!doctype html>
<html lang="en">
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Notifications - King Food</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css' rel='stylesheet'>
  <link rel='stylesheet' href='/site.css'>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="/i18n.js"></script>
  <style>
    .notif-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid var(--accent);
    }
    .notif-item:hover {
      transform: translateX(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .notif-item.read {
      opacity: 0.7;
      border-left-color: #64748b;
    }
    .mark-read-btn {
      transition: all 0.3s ease;
    }
    .mark-read-btn:hover {
      transform: scale(1.05);
    }
    .mark-read-btn:active {
      transform: scale(0.95);
    }
    .notification-check {
      animation: checkPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes checkPop {
      0% { transform: scale(0) rotate(-45deg); }
      50% { transform: scale(1.3) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .empty-state {
      animation: fadeInUp 0.5s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class='p-4'>
  <div class='container'>
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <a href='/home.html' class='btn btn-outline-light mb-2'><i class="bi bi-arrow-left"></i> Home</a>
        <h2><i class="bi bi-bell-fill text-warning"></i> Notifications</h2>
      </div>
      <button id="markAllReadBtn" class="btn btn-primary mark-read-btn">
        <i class="bi bi-check2-all"></i> Mark All as Read
      </button>
    </div>
    <div id='nots'></div>
  </div>
  
  <script src='/site.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('markAllReadBtn');
      if (btn) {
        btn.addEventListener('click', markAllNotificationsRead);
      }
    });
  </script>
</body>
</html>
