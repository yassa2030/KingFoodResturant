<!doctype html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Cart - King Food</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css' rel='stylesheet'>
    <link rel='stylesheet' href='/site.css'>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/i18n.js"></script>
</head>

<body class='p-3'>
    <nav class='navbar navbar-expand-lg nav-theme sticky-top mb-4'>
        <div class='container-fluid'>
            <a class='navbar-brand fw-bold' href='/home.html'>King Food</a>
            <button class='navbar-toggler' data-bs-toggle='collapse' data-bs-target='#navMain'>
                <span class='navbar-toggler-icon'></span>
            </button>
            <div class='collapse navbar-collapse' id='navMain'>
                <ul class='navbar-nav ms-auto'>
                    <li class='nav-item'><a class='nav-link' href='/profile.html' data-i18n="nav_profile">Profile</a></li>
                    <li class='nav-item'><a class='nav-link' href='/home.html' data-i18n="nav_home">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class='container'>
        <div class='d-flex justify-content-between align-items-center mb-4'>
            <h2><i class='bi bi-cart text-warning'></i> <span data-i18n="cart_title">Shopping Cart</span></h2>
        </div>

        <div class='row g-4'>
            <!-- Cart Items Column -->
            <div class='col-lg-8'>
                <div class='panel p-4'>
                    <h4 class='mb-4' data-i18n="cart_items">Items</h4>
                    <div id='cartList'></div>
                </div>
            </div>

            <!-- Order Summary Column -->
            <div class='col-lg-4'>
                <div class='panel p-4' style='position: sticky; top: 100px;'>
                    <h4 class='mb-4' data-i18n="cart_summary">Order Summary</h4>

                    <!-- Discount Section -->
                    <div class='discount-section mb-4'>
                      <label class="form-label" data-i18n="cart_promoCode">Promo Code</label>
                        <div class='discount-input-group d-flex gap-2'>
                            <input id='promoCode' type='text' class="form-control" placeholder='Enter promo code' maxlength='20' data-i18n-placeholder="cart_promoCode">
                            <button id='applyPromo' class='btn btn-primary' data-i18n="cart_promoApply">Apply</button>
                        </div>
                        <div id='discountInfo'></div>
                    </div>

                    <!-- Price Breakdown -->
                    <div id='priceBreakdown' style='margin-bottom: 20px;'>
                        <div style='display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--muted);'>
                            <span data-i18n="cart_subtotal">Subtotal:</span>
                            <span id='subtotal'>$0.00</span>
                        </div>
                        <div style='display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--muted);'>
                            <span data-i18n="cart_tax">Tax:</span>
                            <span id='taxAmount'>$0.00</span>
                        </div>
                        <div style='display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--muted);'>
                            <span data-i18n="cart_shipping">Shipping:</span>
                            <span id='shippingAmount'>$0.00</span>
                        </div>
                        <div id='discountRow' style='display: none; justify-content: space-between; margin-bottom: 10px; color: var(--ok);'>
                            <span data-i18n="cart_discount">Discount:</span>
                            <span id='discountAmount'>-$0.00</span>
                        </div>
                        <div style='border-top: 1px solid #2c3d62; padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between;'>
                            <span style='font-weight: 600; font-size: 18px; color: var(--text);' data-i18n="cart_total">Total:</span>
                            <span id='cartTotal' style='font-weight: 600; font-size: 18px; color: var(--accent);'>$0.00</span>
                        </div>
                    </div>

                    <!-- Checkout Button -->
<button id='checkoutBtn' class='btn btn-primary w-100' style='padding: 12px; font-weight: 600;' onclick="window.location.href='/payment.html'">
    <i class='bi bi-lock'></i> <span data-i18n="cart_checkout">Proceed to Secure Payment</span>
</button>

                    <button class='btn btn-outline-light w-100 mt-2' onclick='location.href="/home.html"'>
                        <i class='bi bi-arrow-left'></i> Continue Shopping
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
    <script src='/site.js'></script>
</body>

</html>
