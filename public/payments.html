<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Payments - King Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/site.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/i18n.js"></script>
    <style>
      .payment-card {
        max-width: 400px;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: #fff;
        border-radius: 16px;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }
      .payment-card::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
      }
      .card-chip {
        width: 50px;
        height: 35px;
        background: linear-gradient(135deg, #ffd700, #daa520);
        border-radius: 6px;
        margin-bottom: 20px;
      }
    </style>
</head>
<body class="p-4">
  <div class="container">
    <a href="/profile.html" class="btn btn-outline-light mb-3">
      <i class="bi bi-arrow-left"></i> <span data-i18n="common_back">Back</span>
    </a>
    <h2 class="mb-4"><i class="bi bi-credit-card text-warning"></i> <span data-i18n="nav_payments">Payment Methods</span></h2>
    
    <div class="row">
      <div class="col-md-6">
        <div id="cardPreview" class="payment-card mb-4">
          <div class="card-chip"></div>
          <h4 id="cardNumPreview">**** **** **** ****</h4>
          <div class="d-flex justify-content-between mt-4">
            <div>
              <small class="text-muted">Cardholder</small>
              <div id="cardNamePrev">YOUR NAME</div>
            </div>
            <div>
              <small class="text-muted">Expires</small>
              <div id="cardExpPrev">MM/YY</div>
            </div>
          </div>
        </div>
        
        <form id="cardForm" class="card p-4">
          <h5 class="mb-3">Add New Card</h5>
          <div class="mb-3">
            <label class="form-label">Card Number</label>
            <input id="cardNumber" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>
          <div class="mb-3">
            <label class="form-label">Cardholder Name</label>
            <input id="cardHolder" class="form-control" placeholder="John Doe">
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Expiry Date</label>
              <input id="cardExpiry" class="form-control" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">CVV</label>
              <input id="cardCVV" class="form-control" placeholder="123" maxlength="3">
            </div>
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="cardDefault">
            <label class="form-check-label" for="cardDefault">Set as default payment method</label>
          </div>
          <button class="btn btn-primary w-100">
            <i class="bi bi-plus-circle"></i> Add Card
          </button>
        </form>
      </div>
      
      <div class="col-md-6">
        <h5 class="mb-3">Saved Cards</h5>
        <div id="cardsList"></div>
      </div>
    </div>
  </div>
  
  <script src="/site.js"></script>
  <script>
    // Card number formatting
    document.getElementById('cardNumber')?.addEventListener('input', function(e) {
      let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
      let formatted = value.match(/.{1,4}/g)?.join(' ') || '';
      e.target.value = formatted;
      
      document.getElementById('cardNumPreview').textContent = formatted || '**** **** **** ****';
    });
    
    document.getElementById('cardHolder')?.addEventListener('input', function(e) {
      document.getElementById('cardNamePrev').textContent = e.target.value.toUpperCase() || 'YOUR NAME';
    });
    
    document.getElementById('cardExpiry')?.addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.slice(0, 2) + '/' + value.slice(2);
      }
      e.target.value = value;
      document.getElementById('cardExpPrev').textContent = value || 'MM/YY';
    });
  </script>
</body>
</html>
